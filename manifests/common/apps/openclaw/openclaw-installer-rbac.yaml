apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-installer-sa
  labels:
    opendatahub.io/dashboard: 'true'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-installer-role
  labels:
    opendatahub.io/dashboard: 'true'
rules:
  # Allow creating/updating OpenClaw resources
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Allow creating/updating OpenClaw CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Allow creating validation configmap
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update"]
    resourceNames: ["openclaw-enable-validation-result"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-installer-rolebinding
  labels:
    opendatahub.io/dashboard: 'true'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-installer-role
subjects:
  - kind: ServiceAccount
    name: openclaw-installer-sa
