apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: opendatahub
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      containers:
        - name: gateway
          image: image-registry.openshift-image-registry.svc:5000/opendatahub/openclaw:latest
          imagePullPolicy: Always
          command:
            - node
            - --max-old-space-size=3200
            - dist/index.js
            - gateway
            - run
            - --bind
            - lan
            - --port
            - "18789"
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENAI_API_KEY
                  optional: true
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node/.openclaw
            - name: tmp-volume
              mountPath: /tmp
          resources:
            requests:
              memory: 2Gi
              cpu: 1000m
            limits:
              memory: 4Gi
              cpu: 2000m
        - name: oauth-proxy
          image: image-registry.openshift-image-registry.svc:5000/opendatahub/origin-oauth-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=:8443
            - --https-address=
            - --provider=openshift
            - --upstream=http://localhost:18789
            - --client-id=system:serviceaccount:opendatahub:openclaw
            - --client-secret-file=/etc/oauth/config/client-secret
            - --cookie-secret-file=/etc/oauth/config/cookie_secret
            - --cookie-expire=23h0m0s
            - --pass-access-token
            - --scope=user:info
            - --skip-auth-regex=^/(metrics|api)
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
          ports:
            - containerPort: 8443
              name: oauth-ui
              protocol: TCP
          volumeMounts:
            - name: oauth-config
              mountPath: /etc/oauth/config
            - name: proxy-tls
              mountPath: /etc/tls/private
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home-pvc
        - name: tmp-volume
          emptyDir: {}
        - name: oauth-config
          secret:
            secretName: openclaw-oauth-config
        - name: proxy-tls
          secret:
            secretName: openclaw-tls
